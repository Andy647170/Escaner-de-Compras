<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Compras</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 20px; font-size: 24px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafafa; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #4b5563; font-size: 14px; text-transform: uppercase; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button.secondary { background-color: #10b981; margin-top: -5px; margin-bottom: 15px; }
        button.secondary:hover { background-color: #059669; }
        #scanner-container { width: 100%; height: 250px; background: #000; border-radius: 8px; overflow: hidden; position: relative; display: none; margin-bottom: 15px; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .status { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; display: none; }
        .success { background-color: #d1fae5; color: #065f46; display: block; }
        .error { background-color: #fee2e2; color: #991b1b; display: block; }
        .info { background-color: #e0f2fe; color: #0369a1; display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 Escáner de Compras</h1>
    
    <div id="status-message" class="status"></div>

    <!-- SECCIÓN ESCÁNER -->
    <div class="section">
        <div class="section-title">1. Escaneo de Producto</div>
        <button id="btn-scan" type="button">📷 Iniciar Cámara</button>
        <div id="scanner-container">
            <video id="video"></video>
        </div>
        <label for="barcode">Código de Barras</label>
        <input type="text" id="barcode" placeholder="Escanea o escribe el código">
        
        <div id="new-product-fields" class="hidden">
            <p style="color: #b45309; font-size: 13px; margin-bottom: 10px; font-weight: bold;">⚠️ Producto nuevo detectado. Completar datos:</p>
            <label for="prod-name">Nombre del Producto</label>
            <input type="text" id="prod-name" placeholder="Ej: Leche Entera 1L">
            <label for="prod-brand">Marca</label>
            <input type="text" id="prod-brand" placeholder="Ej: La Serenísima">
        </div>
        <div id="existing-product-info" class="hidden">
            <p style="color: #047857; font-size: 14px; margin-bottom: 10px; font-weight: bold;">✅ Producto encontrado: <span id="lbl-prod-name"></span></p>
        </div>
    </div>

    <!-- SECCIÓN DATOS COMPRA -->
    <div class="section">
        <div class="section-title">2. Detalles de la Transacción</div>
        
        <label for="purchase-date">Fecha</label>
        <input type="date" id="purchase-date">

        <label for="shop-select">Lugar de Compra</label>
        <select id="shop-select">
            <option value="">-- Seleccionar lugar --</option>
            <option value="NEW">➕ Agregar nuevo lugar...</option>
        </select>
        
        <div id="new-shop-fields" class="hidden">
            <label for="new-shop-name">Nombre del Comercio Nuevo</label>
            <input type="text" id="new-shop-name" placeholder="Ej: Supermercado Ruta 14">
        </div>

        <label for="price">Precio ($)</label>
        <input type="number" id="price" step="0.01" placeholder="0.00" inputmode="decimal">
        
        <label for="quantity">Cantidad</label>
        <input type="number" id="quantity" value="1" min="1">
    </div>

    <button id="btn-submit" type="button">💾 Registrar Compra</button>
</div>

<!-- Incluir biblioteca para leer códigos de barra si se prefiere de forma local, 
     o usar la API BarcodeDetector si el navegador del celular la soporta de forma nativa -->
<script>
    // Configurar fecha de hoy por defecto
    document.getElementById('purchase-date').valueToDate = new Date();
    document.getElementById('purchase-date').value = new Date().toISOString().substring(0, 10);

    const btnScan = document.getElementById('btn-scan');
    const scannerContainer = document.getElementById('scanner-container');
    const video = document.getElementById('video');
    const barcodeInput = document.getElementById('barcode');
    const shopSelect = document.getElementById('shop-select');
    const newShopFields = document.getElementById('new-shop-fields');
    
    // URL de tu Web App de Google Apps Script (se reemplaza al publicar)
    const WEB_APP_URL = https://script.google.com/macros/s/AKfycbyzzdt8_vHB72Hak6LhK50GpQ5Xr8nzSgeRIfHuxlJsJd30givBmOk5nuv8fPgEWAVELQ/exec;

    // Mostrar campos si se selecciona "Agregar nuevo lugar"
    shopSelect.addEventListener('change', (e) => {
        if (e.target.value === 'NEW') {
            newShopFields.classList.remove('hidden');
        } else {
            newShopFields.classList.add('hidden');
        }
    });

    // Simulación de inicialización de cámara y escaneo nativo (BarcodeDetector API)
    btnScan.addEventListener('click', async () => {
        if (!('BarcodeDetector' in window)) {
            showStatus('Tu navegador no soporta escaneo nativo por cámara. Ingresa el código manualmente o usa una librería como QuaggaJS.', 'error');
            return;
        }
        
        scannerContainer.style.display = 'block';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.play();
            
            const barcodeDetector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'code_128'] });
            
            const interval = setInterval(async () => {
                try {
                    const barcodes = await barcodeDetector.detect(video);
                    if (barcodes.length > 0) {
                        barcodeInput.value = barcodes[0].rawValue;
                        showStatus('¡Código detectado!', 'success');
                        clearInterval(interval);
                        stream.getTracks().forEach(track => track.stop());
                        scannerContainer.style.display = 'none';
                        // Disparar búsqueda del producto en Sheets
                        checkProduct(barcodes[0].rawValue);
                    }
                } catch (err) {
                    console.error(err);
                }
            }, 500);
            
        } catch (err) {
            showStatus('Error al acceder a la cámara: ' + err.message, 'error');
        }
    });

    function showStatus(text, type) {
        const msg = document.getElementById('status-message');
        msg.innerText = text;
        msg.className = 'status ' + type;
        setTimeout(() => msg.style.display = 'none', 5000);
    }

    function checkProduct(code) {
        // Aquí se haría un fetch a Google Apps Script para saber si el producto existe
        showStatus('Buscando producto en Google Sheets...', 'info');
        // Simulación de respuesta de red:
        // Si existe: mostrar #existing-product-info
        // Si no existe: mostrar #new-product-fields
    }
</script>
</body>
</html>

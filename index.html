<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Compras</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 20px; font-size: 24px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafafa; }
        .section-title { font-weight: bold; margin-bottom: 10px; color: #4b5563; font-size: 14px; text-transform: uppercase; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button.secondary { background-color: #10b981; margin-top: -5px; margin-bottom: 15px; }
        button.secondary:hover { background-color: #059669; }
        #scanner-container { width: 100%; height: 250px; background: #000; border-radius: 8px; overflow: hidden; position: relative; display: none; margin-bottom: 15px; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .status { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; display: none; }
        .success { background-color: #d1fae5; color: #065f46; display: block; }
        .error { background-color: #fee2e2; color: #991b1b; display: block; }
        .info { background-color: #e0f2fe; color: #0369a1; display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 Escáner de Compras</h1>
    
    <div id="status-message" class="status"></div>

    <!-- SECCIÓN ESCÁNER -->
    <div class="section">
        <div class="section-title">1. Escaneo de Producto</div>
        <button id="btn-scan" type="button">📷 Iniciar Cámara</button>
        <div id="scanner-container">
            <video id="video"></video>
        </div>
        <label for="barcode">Código de Barras</label>
        <input type="text" id="barcode" placeholder="Escanea o escribe el código">
        
        <div id="new-product-fields" class="hidden">
            <p style="color: #b45309; font-size: 13px; margin-bottom: 10px; font-weight: bold;">⚠️ Producto nuevo detectado. Completar datos:</p>
            <label for="prod-name">Nombre del Producto</label>
            <input type="text" id="prod-name" placeholder="Ej: Leche Entera 1L">
            <label for="prod-brand">Marca</label>
            <input type="text" id="prod-brand" placeholder="Ej: La Serenísima">
        </div>
        <div id="existing-product-info" class="hidden">
            <p style="color: #047857; font-size: 14px; margin-bottom: 10px; font-weight: bold;">✅ Producto encontrado: <span id="lbl-prod-name"></span></p>
        </div>
    </div>

    <!-- SECCIÓN DATOS COMPRA -->
    <div class="section">
        <div class="section-title">2. Detalles de la Transacción</div>
        
        <label for="purchase-date">Fecha</label>
        <input type="date" id="purchase-date">

        <label for="shop-select">Lugar de Compra</label>
        <select id="shop-select">
            <option value="">-- Seleccionar lugar --</option>
            <option value="NEW">➕ Agregar nuevo lugar...</option>
        </select>
        
        <div id="new-shop-fields" class="hidden">
            <label for="new-shop-name">Nombre del Comercio Nuevo</label>
            <input type="text" id="new-shop-name" placeholder="Ej: Supermercado Ruta 14">
        </div>

        <label for="price">Precio ($)</label>
        <input type="number" id="price" step="0.01" placeholder="0.00" inputmode="decimal">
        
        <label for="quantity">Cantidad</label>
        <input type="number" id="quantity" value="1" min="1">
    </div>

    <button id="btn-submit" type="button">💾 Registrar Compra</button>
</div>

<!-- Incluir biblioteca para leer códigos de barra si se prefiere de forma local, 
     o usar la API BarcodeDetector si el navegador del celular la soporta de forma nativa -->
<script>
    // Configurar fecha de hoy por defecto
    document.getElementById('purchase-date').value = new Date().toISOString().substring(0, 10);

    const btnScan = document.getElementById('btn-scan');
    const scannerContainer = document.getElementById('scanner-container');
    const video = document.getElementById('video');
    const barcodeInput = document.getElementById('barcode');
    const shopSelect = document.getElementById('shop-select');
    const newShopFields = document.getElementById('new-shop-fields');
    const btnSubmit = document.getElementById('btn-submit');
    
    // Tu URL ya pegada
    const WEB_APP_URL = https://script.google.com/macros/s/AKfycbyzzdt8_vHB72Hak6LhK50GpQ5Xr8nzSgeRIfHuxlJsJd30givBmOk5nuv8fPgEWAVELQ/exec; // <-- Asegurate de que quede tu URL real acá
   
    // Variables de control de estado del producto
    let esNuevoProducto = false;

    // Al cargar la página, traer los comercios ya guardados en Sheets
    window.addEventListener('DOMContentLoaded', cargarLugares);

    // Mostrar campos si se selecciona "Agregar nuevo lugar"
    shopSelect.addEventListener('change', (e) => {
        if (e.target.value === 'NEW') {
            newShopFields.classList.remove('hidden');
        } else {
            newShopFields.classList.add('hidden');
        }
    });

    // Detectar cuando el usuario escribe a mano o el escáner pega un código
    barcodeInput.addEventListener('change', (e) => {
        if (e.target.value.trim() !== "") {
            buscarProductoEnSheets(e.target.value.trim());
        }
    });

    // --- FUNCIÓN DE ESCANEO POR CÁMARA ---
    btnScan.addEventListener('click', async () => {
        if (!('BarcodeDetector' in window)) {
            showStatus('Tu navegador no soporta escaneo nativo. Ingresá el código manualmente.', 'error');
            return;
        }
        
        scannerContainer.style.display = 'block';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.play();
            
            const barcodeDetector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'code_128'] });
            
            const interval = setInterval(async () => {
                try {
                    const barcodes = await barcodeDetector.detect(video);
                    if (barcodes.length > 0) {
                        const codigo = barcodes[0].rawValue;
                        barcodeInput.value = codigo;
                        showStatus('¡Código detectado!', 'success');
                        clearInterval(interval);
                        stream.getTracks().forEach(track => track.stop());
                        scannerContainer.style.display = 'none';
                        
                        // Buscar en Sheets inmediatamente después de escanear
                        buscarProductoEnSheets(codigo);
                    }
                } catch (err) {
                    console.error(err);
                }
            }, 500);
            
        } catch (err) {
            showStatus('Error al acceder a la cámara: ' + err.message, 'error');
        }
    });

    // --- COMUNICACIÓN CON GOOGLE SHEETS ---

    // 1. Cargar la lista de Lugares (Función doGet)
    async function cargarLugares() {
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            if (data.lugares) {
                // Limpiar opciones previas excepto las básicas
                shopSelect.innerHTML = `
                    <option value="">-- Seleccionar lugar --</option>
                    <option value="NEW">➕ Agregar nuevo lugar...</option>
                `;
                data.lugares.forEach(lugar => {
                    const opt = document.createElement('option');
                    opt.value = lugar;
                    opt.textContent = lugar;
                    // Insertar antes del botón "Agregar nuevo"
                    shopSelect.insertBefore(opt, shopSelect.lastElementChild);
                });
            }
        } catch (error) {
            console.error("Error al cargar comercios:", error);
        }
    }

    // 2. Buscar si el producto ya existe en Sheets
    async function buscarProductoEnSheets(codigo) {
        showStatus('Buscando producto en tu base de datos...', 'info');
        
        try {
            // Le hacemos una petición GET a la Web App pasándole el código para buscarlo
            const response = await fetch(`${WEB_APP_URL}?action=buscarProducto&codigo=${codigo}`);
            const data = await response.json();
            
            const divNuevo = document.getElementById('new-product-fields');
            const divExistente = document.getElementById('existing-product-info');
            const lblProdName = document.getElementById('lbl-prod-name');

            if (data.existe) {
                esNuevoProducto = false;
                divNuevo.classList.add('hidden');
                divExistente.classList.remove('hidden');
                lblProdName.textContent = `${data.nombre} (${data.marca})`;
                showStatus('Producto encontrado.', 'success');
            } else {
                esNuevoProducto = true;
                divExistente.classList.add('hidden');
                divNuevo.classList.remove('hidden');
                document.getElementById('prod-name').value = "";
                document.getElementById('prod-brand').value = "";
                showStatus('Código nuevo. Por favor, completá los detalles del producto.', 'info');
            }
        } catch (error) {
            showStatus('Error de conexión al buscar producto.', 'error');
            console.error(error);
        }
    }

    // 3. Enviar todo el registro de compra (Función doPost)
    btnSubmit.addEventListener('click', async () => {
        const codigo = barcodeInput.value.trim();
        const fecha = document.getElementById('purchase-date').value;
        let lugar = shopSelect.value;
        const precio = document.getElementById('price').value;
        const cantidad = document.getElementById('quantity').value;

        // Validaciones básicas
        if (!codigo || !fecha || !lugar || !precio) {
            showStatus('Por favor, completá todos los campos obligatorios.', 'error');
            return;
        }

        let esNuevoLugar = false;
        if (lugar === 'NEW') {
            lugar = document.getElementById('new-shop-name').value.trim();
            if (!lugar) {
                showStatus('Escribí el nombre del nuevo comercio.', 'error');
                return;
            }
            esNuevoLugar = true;
        }

        // Armamos el paquete de datos
        const payload = {
            codigoBarras: codigo,
            fecha: fecha,
            lugarNombre: lugar,
            precio: precio,
            cantidad: cantidad,
            esNuevoProducto: esNuevoProducto,
            esNuevoLugar: esNuevoLugar,
            nombreProducto: esNuevoProducto ? document.getElementById('prod-name').value.trim() : "",
            marcaProduct: esNuevoProducto ? document.getElementById('prod-brand').value.trim() : ""
        };

        showStatus('Registrando compra...', 'info');

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Evita problemas de CORS comunes con Apps Script
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            // Al usar 'no-cors', no podemos leer la respuesta JSON directa por seguridad del navegador,
            // pero si la petición se realiza con éxito, asumimos el guardado.
            showStatus('¡Compra registrada con éxito!', 'success');
            
            // Limpiar formulario para la siguiente compra
            barcodeInput.value = "";
            document.getElementById('price').value = "";
            document.getElementById('quantity').value = "1";
            document.getElementById('new-product-fields').classList.add('hidden');
            document.getElementById('existing-product-info').classList.add('hidden');
            newShopFields.classList.add('hidden');
            
            // Recargar la lista de lugares por si agregamos uno nuevo
            if (esNuevoLugar) {
                setTimeout(cargarLugares, 1500);
            }

        } catch (error) {
            showStatus('Ocurrió un error al enviar los datos.', 'error');
            console.error(error);
        }
    });

    function showStatus(text, type) {
        const msg = document.getElementById('status-message');
        msg.innerText = text;
        msg.className = 'status ' + type;
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 6000);
    }
</script>
</body>
</html>
